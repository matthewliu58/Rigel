# config-.yaml
port: "8081"
envoy_path_base: "/root"
envoy_path: "/root/envoy"       # Envoy 可执行文件路径
envoy_log: "/root/envoy.log"       # Envoy 日志文件路径
envoy_config: "/root/envoy-mini.yaml"
server_list:                             # Etcd 集群所有节点
  - "173.199.92.182"
server_ip: "173.199.92.182"                    # 当前节点 IP
data_dir: "/root/etcd"                # Etcd 数据目录
#name: "etcd-1"                            # 当前节点名字

scaling:
  username: "root"
  local_path_proxy: "./install/data-proxy"
  remote_path_proxy: "/root/data-proxy"
  binary_proxy: "data-proxy"
  local_path_plane: "./install/data-plane"
  remote_path_plane: "/root/data-plane"
  binary_plane: "data-plane"
  config: "{}"
  private_key: "/root/.ssh/id_rsa"
  ssh_key: "ssh-rsa"

node:
  provider: "vultr"        # gcp | aws | azure | vultr | digitalocean | onprem
  continent: "northAmerica"      # ONLY field used for bandwidth / cost query
  country: "us"          # 可选，用于日志/解释/未来扩展
  city: "chicago"          # 可选，用于日志/解释/未来扩展
  ip:
    private: "0.0.0.0"  # 内网 IP
    public: "173.199.92.182" # 公网 IP 作为hostname

proxy:
  ips:
    - "173.199.92.182"

